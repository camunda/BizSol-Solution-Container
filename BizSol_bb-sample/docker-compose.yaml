services:
  sample-java-worker:
    image: maven:3.9-eclipse-temurin-21
    extra_hosts:
      - "host.docker.internal:host-gateway"
    working_dir: /app
    volumes:
      - ./java:/app
      - sample-maven-cache:/root/.m2
    environment:
      CAMUNDA_CLIENT_MODE: self-managed
      CAMUNDA_CLIENT_REST_ADDRESS: ${CAMUNDA_BASE_URL:-http://host.docker.internal:8080}
      CAMUNDA_CLIENT_GRPC_ADDRESS: http://host.docker.internal:${CAMUNDA_GRPC_PORT:-26500}
    command: mvn spring-boot:run
    depends_on:
      camunda-check:
        condition: service_completed_successfully
        required: false

  sample-node-worker:
    image: node:22-alpine
    extra_hosts:
      - "host.docker.internal:host-gateway"
    working_dir: /app
    volumes:
      - ./nodejs:/app
      - sample-node-modules:/app/node_modules
    environment:
      ZEEBE_REST_ADDRESS: ${CAMUNDA_BASE_URL:-http://host.docker.internal:8080}
      CAMUNDA_AUTH_STRATEGY: NONE
    command: sh -c "npm install && npm start"
    depends_on:
      camunda-check:
        condition: service_completed_successfully
        required: false

volumes:
  sample-maven-cache:
  sample-node-modules: