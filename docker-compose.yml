include:
  - docker-compose.ai.yaml
  - docker-compose.vector-db.yml
  - BizSol_bb-sample/docker-compose.yaml
  
services:
  # init service that waits for Camunda (c8run) to be available before other services start
  camunda-check:
    image: busybox
    profiles:
      - checks
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - CAMUNDA_BASE_URL=${CAMUNDA_BASE_URL:-http://host.docker.internal:8080}
    command: >
      sh -c "
        HOST=$$(echo $$CAMUNDA_BASE_URL | sed -e 's|.*://||' -e 's|:.*||');
        PORT=$$(echo $$CAMUNDA_BASE_URL | sed -e 's|.*:||' -e 's|/.*||');
        echo \"Checking for Camunda at $$HOST:$$PORT...\";
        until nc -z $$HOST $$PORT 2>/dev/null; do
          echo \"Waiting for Camunda ($$HOST:$$PORT)...\";
          sleep 3;
        done;
        echo 'Camunda is available! Starting services...'
      "
