include:
  - docker-compose.ai.yaml
  - BizSol_bb-Verification-Agent/docker-compose.verification-agent.yaml
  
services:
  # init service that waits for Camunda (c8run) to be available before other services start
  camunda-check:
    image: busybox
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - CAMUNDA_HOST=${CAMUNDA_HOST:-host.docker.internal}
      - CAMUNDA_PORT=${CAMUNDA_PORT:-8080}
    command: >
      sh -c "
        echo \"Checking for Camunda at $$CAMUNDA_HOST:$$CAMUNDA_PORT...\";
        until nc -z $$CAMUNDA_HOST $$CAMUNDA_PORT 2>/dev/null; do
          echo \"Waiting for Camunda ($$CAMUNDA_HOST:$$CAMUNDA_PORT)...\";
          sleep 3;
        done;
        echo 'Camunda is available! Starting services...'
      "
