services:
  cosmosdb:
    image: mcr.microsoft.com/cosmosdb/linux/azure-cosmos-emulator:vnext-preview
    container_name: cosmosdb-emulator
    # Run in HTTP mode to avoid TLS certificate mismatch when other containers
    # (e.g. Camunda connector runtime) connect via service name instead of localhost.
    # Camunda Vector DB connector endpoint: http://cosmosdb:8081
    command: ["--protocol", "http"]
    ports:
      - "${COSMOSDB_API_PORT:-8181}:8081"   # NoSQL API endpoint (HTTP, no TLS)
      - "${COSMOSDB_HEALTH_PORT:-8180}:8080"   # Health/readiness probes
      - "${COSMOSDB_EXPLORER_PORT:-1234}:1234"   # Data Explorer UI
    environment:
      - AZURE_COSMOS_EMULATOR_ENABLE_DATA_PERSISTENCE=true
    volumes:
      - ./container-maps/cosmosdb-data:/tmp/cosmos/appdata
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8180/ready"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped