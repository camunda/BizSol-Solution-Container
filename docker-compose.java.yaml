x-spring-app: &spring-app
  image: ibm-semeru-runtimes:open-21-jdk # b/c best performance wrt to cold start and restart/reload
  extra_hosts:
    - "host.docker.internal:host-gateway"
  environment: &common-env
    # expects a local c8run as go-to Camunda instance
    ZEEBE_CLIENT_BROKER_GATEWAY-ADDRESS: host.docker.internal:26500
    CAMUNDA_CLIENT_ZEEBE_BASE-URL: http://host.docker.internal:8080
    SPRING_DEVTOOLS_RESTART_ENABLED: "true"
    SPRING_DEVTOOLS_LIVERELOAD_ENABLED: "true"
    JAVA_TOOL_OPTIONS: "-Xshareclasses:cacheDir=/cache -Xquickstart" # cache compiled classes

    
# for Spring HotReload https://docs.spring.io/spring-boot/reference/using/devtools.html
## Add DevTools to Each Spring Boot App
## In each app's pom.xml:
# <dependencies>
#     <!-- ... other dependencies ... -->
#
#     <dependency>
#         <groupId>org.springframework.boot</groupId>
#         <artifactId>spring-boot-devtools</artifactId>
#         <scope>runtime</scope>
#         <optional>true</optional>
#     </dependency>
# </dependencies>


services:
  prompt-safeguard:
    <<: *spring-app
    working_dir: /app
    volumes:
      - ./prompt-safeguard:/app
      - maven-cache:/root/.m2
      - j9-cache:/cache
    command: ./mvnw spring-boot:run -Dspring-boot.run.jvmArguments="-Dspring.devtools.restart.enabled=true"
    ports:
      - "${PROMPT_SAFEGUARD_PORT:-8081}:8080"
      - "${PROMPT_SAFEGUARD_LIVERELOAD_PORT:-35729}:35729"

  # app2:
  #   <<: *spring-app
  #   working_dir: /app
  #   volumes:
  #     - ./spring-app-2:/app
  #     - maven-cache:/root/.m2
  #     - j9-cache:/cache
